name: Notion Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_08_WEBSITE_CMS_PAGE_ID: ${{ secrets.NOTION_08_WEBSITE_CMS_PAGE_ID }}
        run: node scripts/notion-sync.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "notion-sync-bot"
          git config user.email "notion-sync-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "sync: update site content from Notion 08 Website CMS"
            git push
          else
            echo "No changes from Notion sync."
          fi
