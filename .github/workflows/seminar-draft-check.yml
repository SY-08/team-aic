name: Seminar draft check

on:
  workflow_dispatch: {}
  push:
    paths:
      - "docs/seminars/drafts/**"
      - "docs/seminars/material-template.md"
      - "scripts/seminar-draft.mjs"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate drafts
        run: node scripts/seminar-draft.mjs --check-all
