<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マクロ経済シナジーMAP｜日本の経済を冒険する | team AIC</title>
<meta name="description" content="日本のGDPから、産業・歳出・歳入・国の借金までを、開くほど広がるマインドマップで紐解く。誰でも操作できる経済の地図。">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://sy-08.github.io/team-aic/macro-map.html">
<style>
  :root{ --blue:#2a6fb5; --blueD:#1c548c; --ink:#22303c; --paper:#eef4fb; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--ink);overflow:hidden;}
  body{background:radial-gradient(1200px 700px at 30% 20%,#eaf3ff 0%,#dce9f7 55%,#cfe0f2 100%);}
  #bar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.82);backdrop-filter:blur(6px);border-bottom:1px solid #d5e3f2;}
  #bar h1{font-size:clamp(15px,3.4vw,20px);margin:0;color:var(--blueD);}
  #bar .hint{font-size:12px;color:#5a6f82;margin-left:auto;}
  #bar a{font-size:13px;color:var(--blue);text-decoration:none;font-weight:700;}
  .zoombtn{border:0;background:#fff;color:var(--blueD);font-weight:900;width:38px;height:38px;border-radius:12px;box-shadow:0 3px 8px rgba(20,60,110,.15);cursor:pointer;font-size:18px;}
  #zoom{position:fixed;right:14px;bottom:16px;z-index:10;display:flex;flex-direction:column;gap:8px;}
  #stage{position:fixed;inset:0;top:0;cursor:grab;overflow:hidden;}
  #stage.drag{cursor:grabbing;}
  #world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  svg#links{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  .node{position:absolute;width:220px;transform:translate(-0px,-50%);}
  .card{background:#fff;border-radius:16px;padding:11px 13px;box-shadow:0 8px 22px rgba(20,60,110,.14);border-left:7px solid var(--blue);cursor:pointer;transition:box-shadow .15s,transform .15s;}
  .card:hover{box-shadow:0 12px 28px rgba(20,60,110,.22);transform:translateY(-1px);}
  .card .lbl{font-weight:800;font-size:14px;line-height:1.35;}
  .card .val{font-weight:900;font-size:20px;color:var(--blueD);margin-top:2px;}
  .card .val small{font-size:12px;font-weight:700;color:#6a7b8b;margin-left:3px;}
  .card .note{font-size:12px;color:#5a6f82;line-height:1.55;margin-top:5px;display:none;}
  .card.open .note{display:block;}
  .card .tag{display:inline-block;font-size:10.5px;font-weight:800;color:#fff;border-radius:999px;padding:1px 8px;margin-top:5px;}
  .card .kids{font-size:11px;color:var(--blue);font-weight:800;margin-top:6px;}
  .root .card{border-left-width:0;border-top:7px solid var(--blueD);text-align:center;}
  .root .card .val{font-size:30px;}
  .legend{position:fixed;left:14px;bottom:16px;z-index:10;background:rgba(255,255,255,.9);border-radius:14px;padding:10px 12px;box-shadow:0 6px 16px rgba(20,60,110,.14);font-size:12px;max-width:240px;}
  .legend b{display:block;margin-bottom:4px;color:var(--blueD);}
  .legend span{display:inline-flex;align-items:center;gap:5px;margin:2px 8px 2px 0;}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block;}
  @media(max-width:640px){ .legend{display:none;} }
</style>
</head>
<body>
<div id="bar">
  <h1>🗾 マクロ経済シナジーMAP</h1>
  <span class="hint">カードを タップで ひらく／ドラッグで うごく</span>
  <a href="index.html">← team AIC</a>
</div>
<div id="stage">
  <div id="world">
    <svg id="links"></svg>
  </div>
</div>
<div id="zoom">
  <button class="zoombtn" id="zin">＋</button>
  <button class="zoombtn" id="zout">－</button>
  <button class="zoombtn" id="zreset" style="font-size:13px">⟳</button>
</div>
<div class="legend">
  <b>この地図のみかた</b>
  <span><i style="background:#3aa564"></i>産業（生み出す）</span>
  <span><i style="background:#e0663a"></i>歳出（使う）</span>
  <span><i style="background:#2a6fb5"></i>歳入（集める）</span>
  <span><i style="background:#5b4a66"></i>国の借金</span>
  <span><i style="background:#8a6fbf"></i>貿易</span>
  <div style="margin-top:6px;color:#6a7b8b">出典：総務省統計局 国民経済計算／財務省</div>
</div>

<script>
(function(){
"use strict";
const C={ind:"#3aa564",out:"#e0663a",inc:"#2a6fb5",debt:"#5b4a66",trade:"#8a6fbf",root:"#1c548c"};
let uid=0; const N=(o)=>({id:"n"+(uid++),open:false,children:[],...o});

const DATA=N({label:"日本の GDP（2023年・名目）",val:"591.5",unit:"兆円",color:C.root,
  note:"日本ぜんたいが 1年で生み出した ねうちの合計。2013年は 486.2兆円 → 10年で +105兆円 ふえた。",
  children:[
   N({label:"① 産業でわける（だれが生み出す？）",color:C.ind,note:"GDPは 働く分野ごとに 分けられる。大きい順にならべたよ。",children:[
     N({label:"医療・福祉",val:"57.7",unit:"兆円",color:C.ind,note:"最大級。高齢化で のびる。介護・医療・保健。2013年 43.4兆円。"}),
     N({label:"建設",val:"36.4",unit:"兆円",color:C.ind,note:"家・ビル・道路をつくる。2013年 29.5兆円。"}),
     N({label:"専門・科学技術／業務支援",val:"36.4",unit:"兆円",color:C.ind,note:"研究・IT・コンサルなど。2013年 27.4兆円。のびた。"}),
     N({label:"住宅賃貸業",val:"32.5",unit:"兆円",color:C.ind,note:"家ちんなど。2013年 29.8兆円。"}),
     N({label:"卸売",val:"31.7",unit:"兆円",color:C.ind,note:"お店に商品を おろす仕事。2013年 28.9兆円。"}),
     N({label:"小売",val:"31.5",unit:"兆円",color:C.ind,note:"お店で うる仕事。2013年 28.8兆円。"}),
     N({label:"金融・保険",val:"29.2",unit:"兆円",color:C.ind,note:"銀行・ほけん。2013年 20.2兆円 → 大きくのびた。"}),
     N({label:"公務",val:"27.3",unit:"兆円",color:C.ind,note:"役所などの仕事。2013年 22.7兆円。"}),
     N({label:"運輸・郵便",val:"26.2",unit:"兆円",color:C.ind,note:"モノや人をはこぶ。2013年 22.2兆円。"}),
     N({label:"化学",val:"19.9",unit:"兆円",color:C.ind,note:"くすり・素材など。2013年 14.7兆円。"}),
     N({label:"宿泊・飲食",val:"14.0",unit:"兆円",color:C.ind,note:"ホテル・レストラン。2013年 9.4兆円。"}),
     N({label:"食料品（製造）",val:"12.5",unit:"兆円",color:C.ind,note:"食べ物をつくる。2013年 9.8兆円。"}),
     N({label:"教育",val:"9.5",unit:"兆円",color:C.ind,note:"学校・大学など。2013年 8.8兆円。"}),
     N({label:"農業",val:"8.9",unit:"兆円",color:C.ind,note:"お米・やさいなど。2013年 7.9兆円。"})
   ]}),
   N({label:"② 国の 使いみち（歳出）2023年度・実績",val:"127.6",unit:"兆円",color:C.out,note:"国が 1年で 使ったお金。大きい順。",children:[
     N({label:"社会保障",val:"43.8",unit:"兆円",color:C.out,note:"年金・医療・介護・子育て。いちばん大きい。"}),
     N({label:"国債費",val:"25.2",unit:"兆円",color:C.out,note:"借金の へんさいと 利子。→「国の借金」につながる。"}),
     N({label:"地方交付税交付金等",val:"18.4",unit:"兆円",color:C.out,note:"地方の 役所へ 配るお金。"}),
     N({label:"防衛",val:"12.8",unit:"兆円",color:C.out,note:"国をまもる ためのお金。"}),
     N({label:"公共事業",val:"8.2",unit:"兆円",color:C.out,note:"道路・橋・堤防など。"}),
     N({label:"文教・科学振興",val:"8.2",unit:"兆円",color:C.out,note:"教育と 研究のお金。"})
   ]}),
   N({label:"③ 国の お金の集め方（歳入）2023年度",val:"127.6",unit:"兆円",color:C.inc,note:"使うお金は どこから？ 集め方の うちわけ。",children:[
     N({label:"税収",val:"71.1",unit:"兆円",color:C.inc,note:"所得税・法人税・消費税で 約8わり。"}),
     N({label:"公債金（国債発行）",val:"43.9",unit:"兆円",color:C.inc,note:"たりない分を 借金で まかなう。これが つもって「国の借金」に。"}),
     N({label:"その他収入",val:"12.5",unit:"兆円",color:C.inc,note:"税金いがいの 収入。"})
   ]}),
   N({label:"④ 国の 借金（国債発行残高）",val:"約1,054",unit:"兆円",color:C.debt,note:"毎年の 公債金が つみ重なった 総額（2025年3月末）。GDP 591兆円の 約1.8倍。使いみちの『国債費』で 少しずつ返している。"}),
   N({label:"⑤ 貿易（サービス・デジタル）",color:C.trade,note:"モノだけでなく、サービスや データの やり取りも 大事に。",children:[
     N({label:"サービス貿易",color:C.trade,note:"旅行・輸送・知的財産など、形のない やり取り。"}),
     N({label:"デジタル貿易",color:C.trade,note:"データ・ソフト・オンラインサービスの やり取り。これから のびる分野。"})
   ]})
  ]
});

const world=document.getElementById("world"), stage=document.getElementById("stage"), svg=document.getElementById("links");
const COLW=270, ROWH=96;
let nodeEls={};
function buildEls(node){ const d=document.createElement("div"); d.className="node"+(node===DATA?" root":""); d.dataset.id=node.id;
  const hasKids=node.children&&node.children.length;
  d.innerHTML="<div class='card' style='border-color:"+node.color+"'>"+
    "<div class='lbl'>"+node.label+"</div>"+
    (node.val?"<div class='val'>"+node.val+"<small>"+(node.unit||"")+"</small></div>":"")+
    "<div class='note'>"+node.note+"</div>"+
    (hasKids?"<div class='kids' data-k>▸ ひらく（"+node.children.length+"）</div>":"")+
    "</div>";
  world.appendChild(d); nodeEls[node.id]=d;
  d.querySelector(".card").addEventListener("click",()=>toggle(node));
  if(hasKids) node.children.forEach(buildEls);
}
function toggle(node){ const card=nodeEls[node.id].querySelector(".card"); card.classList.toggle("open");
  if(node.children&&node.children.length){ node.open=!node.open; const k=card.querySelector("[data-k]"); if(k)k.textContent=(node.open?"▾ とじる（":"▸ ひらく（")+node.children.length+"）"; layout(); }
}
// measure visible leaf-rows
function measure(node){ if(!node.open||!node.children.length) return 1; let s=0; node.children.forEach(c=>s+=measure(c)); return s; }
function assign(node,depth,top,pos){ const h=measure(node); node._x=depth; node._y=top+h/2;
  if(node.open&&node.children.length){ let cur=top; node.children.forEach(c=>{ assign(c,depth+1,cur,pos); cur+=measure(c); }); }
  pos.push(node);
}
function visibleNodes(node,arr){ arr.push(node); if(node.open) node.children.forEach(c=>visibleNodes(c,arr)); return arr; }
function layout(){
  const pos=[]; assign(DATA,0,0,pos);
  const vis=visibleNodes(DATA,[]);
  // hide all, show visible
  Object.values(nodeEls).forEach(el=>el.style.display="none");
  let links="";
  vis.forEach(node=>{ const el=nodeEls[node.id]; el.style.display="block";
    const X=node._x*COLW+40, Y=node._y*ROWH+30;
    el.style.left=X+"px"; el.style.top=Y+"px";
    if(node.open){ node.children.forEach(c=>{ const x1=X+220, y1=Y, x2=c._x*COLW+40, y2=c._y*ROWH+30;
      const mx=(x1+x2)/2; links+="<path d='M"+x1+","+y1+" C"+mx+","+y1+" "+mx+","+y2+" "+x2+","+y2+"' stroke='"+c.color+"' stroke-width='2.5' fill='none' opacity='.5'/>"; }); }
  });
  svg.innerHTML=links;
  // size world
  let maxX=0,maxY=0; vis.forEach(n=>{ maxX=Math.max(maxX,n._x*COLW+300); maxY=Math.max(maxY,n._y*ROWH+120); });
  world.style.width=maxX+"px"; world.style.height=maxY+"px"; svg.setAttribute("width",maxX); svg.setAttribute("height",maxY);
}

buildEls(DATA);
DATA.open=true; // start with main branches open
DATA.children.forEach(c=>{ /* keep sub closed */ });
// open root's kids labels
(function(){ const card=nodeEls[DATA.id].querySelector(".card"); card.classList.add("open"); const k=card.querySelector("[data-k]"); if(k)k.textContent="▾ とじる（"+DATA.children.length+"）"; })();
layout();

/* pan & zoom */
let scale=0.9, tx=30, ty=90, panning=false, sx=0, sy=0, ox=0, oy=0;
function apply(){ world.style.transform="translate("+tx+"px,"+ty+"px) scale("+scale+")"; }
apply();
stage.addEventListener("mousedown",e=>{ if(e.target.closest(".card"))return; panning=true; stage.classList.add("drag"); sx=e.clientX; sy=e.clientY; ox=tx; oy=ty; });
addEventListener("mousemove",e=>{ if(!panning)return; tx=ox+(e.clientX-sx); ty=oy+(e.clientY-sy); apply(); });
addEventListener("mouseup",()=>{ panning=false; stage.classList.remove("drag"); });
stage.addEventListener("touchstart",e=>{ if(e.target.closest(".card"))return; const t=e.touches[0]; panning=true; sx=t.clientX; sy=t.clientY; ox=tx; oy=ty; },{passive:true});
stage.addEventListener("touchmove",e=>{ if(!panning)return; const t=e.touches[0]; tx=ox+(t.clientX-sx); ty=oy+(t.clientY-sy); apply(); },{passive:true});
stage.addEventListener("touchend",()=>{ panning=false; });
stage.addEventListener("wheel",e=>{ e.preventDefault(); const d=e.deltaY<0?1.1:0.9; scale=Math.min(1.8,Math.max(0.35,scale*d)); apply(); },{passive:false});
document.getElementById("zin").onclick=()=>{ scale=Math.min(1.8,scale*1.15); apply(); };
document.getElementById("zout").onclick=()=>{ scale=Math.max(0.35,scale*0.87); apply(); };
document.getElementById("zreset").onclick=()=>{ scale=0.9; tx=30; ty=90; apply(); };
})();
</script>
</body>
</html>
